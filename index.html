<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captiours - Bulk Carousel Post Editor</title>

    <!-- Preconnect for external Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Import Google Font Inter and Google Material Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- External Modular Style Sheet -->
    <link rel="stylesheet" href="css/style.css">

    <!-- HTML2Canvas Rendering Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>

    <!-- Modular Application JavaScript Logic -->
    <script src="js/app.js" defer></script>
</head>
<body>

    <!-- Header & Navigation Bar -->
    <header class="navbar">
        <a href="#" class="navbar-brand" aria-label="Captiours Beranda">
            <span class="material-icons" aria-hidden="true">layers</span>
            Captiours
        </a>
        <div class="navbar-actions">
            <button class="icon-button" id="openSettingsModal" title="Pengaturan Global" aria-label="Buka Pengaturan Global" aria-haspopup="dialog" aria-expanded="false">
                <span class="material-icons">settings</span>
            </button>
        </div>
    </header>

    <!-- Main Content Dual-Column Layout -->
    <main class="main-layout">

        <!-- Left Side: Interactive Editor -->
        <section class="editor-container" aria-label="Form Editor Halaman Karusel">

            <!-- Dynamic Form Fields Mount -->
            <div id="formsContainer">
                <!-- Page editor cards will load dynamically via JS -->
            </div>

            <!-- Empty State illustration shown when there are no pages -->
            <div id="emptyState" class="empty-state" style="display: none;">
                <span class="material-icons" aria-hidden="true">dashboard_customize</span>
                <p>Belum ada halaman karusel. Silakan tambah halaman baru.</p>
            </div>

            <!-- Action button to Add Page -->
            <button class="btn-secondary" id="addPageBtn" aria-label="Tambah Halaman Baru">
                <span class="material-icons" aria-hidden="true">add</span>
                Tambah Halaman
            </button>
        </section>

        <!-- Right Side: Real-Time Preview (Desktop Sticky Sidebar) -->
        <aside class="preview-sidebar" aria-label="Pratinjau Karusel Real-time">
            <div class="sidebar-header">
                <span class="material-icons" aria-hidden="true">visibility</span>
                <h2>Pratinjau Karusel</h2>
            </div>
            <div class="preview-grid" id="sidebarPreviewContainer">
                <!-- Real-time canvas elements will be automatically loaded here on Desktop -->
            </div>
        </aside>

    </main>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal" role="dialog" aria-modal="true" aria-labelledby="settingsModalTitle">
        <div class="modal-content">
            <header class="modal-header">
                <h3 id="settingsModalTitle">Pengaturan Global</h3>
                <button class="icon-button" id="closeSettingsModal" aria-label="Tutup Pengaturan Global">
                    <span class="material-icons" aria-hidden="true">close</span>
                </button>
            </header>
            <div class="modal-body">

                <!-- Dark Mode / Theme Mode Toggle (Accessibility Friendly) -->
                <div class="toggle-container">
                    <div class="toggle-label">
                        <span class="toggle-title">Mode Gelap (App)</span>
                        <span class="toggle-description" id="theme-toggle-desc">Ubah tema tampilan editor Captiours</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="appThemeToggle" aria-describedby="theme-toggle-desc">
                        <span class="slider"></span>
                    </label>
                </div>

                <!-- Creator Handle Username Input -->
                <div class="input-group">
                    <label for="creatorNameInput">Nama Akun Kreator</label>
                    <input type="text" id="creatorNameInput" value="@captiours" placeholder="Contoh: @nama_kreator">
                </div>

                <!-- Live Preview Colors Themes Select -->
                <div class="input-group">
                    <label for="themeSelect">Tema Warna Karusel</label>
                    <select id="themeSelect">
                        <option value="light">Terang (Clean)</option>
                        <option value="dark">Gelap (Dark)</option>
                        <option value="ocean">Biru Samudra</option>
                        <option value="forest">Hijau Hutan</option>
                        <option value="sunset">Jingga Senja</option>
                        <option value="coffee">Kopi Latte</option>
                        <option value="cyberpunk">Cyberpunk Neon</option>
                    </select>
                </div>

                <!-- Cover Image Ratio Dynamic Height Range Slider -->
                <div class="input-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
                        <label for="coverHeight">Tinggi Sampul Gambar</label>
                        <span id="heightValue" style="font-weight: 600; font-size: 13px;">45</span><span style="font-size: 13px;">%</span>
                    </div>
                    <input type="range" id="coverHeight" min="20" max="80" value="45" aria-valuemin="20" aria-valuemax="80" aria-valuenow="45">
                </div>

                <!-- Font Scale Level Range Slider -->
                <div class="input-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
                        <label for="fontScale">Skala Ukuran Font</label>
                        <span id="fontScaleValue" style="font-weight: 600; font-size: 13px;">1.00</span><span style="font-size: 13px;">x</span>
                    </div>
                    <input type="range" id="fontScale" min="0.8" max="1.4" step="0.05" value="1.0" aria-valuemin="0.8" aria-valuemax="1.4" aria-valuenow="1.0">
                </div>

            </div>
        </div>
    </div>

    <!-- Mobile-only Preview Modal Overlay -->
    <div class="modal-overlay" id="previewModal" role="dialog" aria-modal="true" aria-labelledby="previewModalTitle">
        <div class="modal-content" style="max-width: 440px;">
            <header class="modal-header">
                <h3 id="previewModalTitle">Pratinjau Karusel</h3>
                <button class="icon-button" id="closePreviewModal" aria-label="Tutup Pratinjau Karusel">
                    <span class="material-icons" aria-hidden="true">close</span>
                </button>
            </header>
            <div class="modal-body">
                <div class="preview-grid" id="previewContainer">
                    <!-- Preview renders are automatically populated on mobile sizes -->
                </div>
            </div>
        </div>
    </div>

    <!-- Persistent Floating Action Buttons (FAB) -->
    <div class="fab-container">
        <!-- Download All Pages Button -->
        <button class="fab" id="downloadAllBtn" title="Unduh Semua Berkas Halaman">
            <span class="material-icons" aria-hidden="true">download</span>
            Unduh
        </button>
        <!-- Open Preview Modal Button (Mobile/Tablet Only) -->
        <button class="fab fab-icon-only" id="openPreviewModal" title="Pratinjau Karusel" aria-label="Buka Pratinjau Karusel" aria-haspopup="dialog" aria-expanded="false">
            <span class="material-icons">visibility</span>
        </button>
    </div>

</body>
</html>
